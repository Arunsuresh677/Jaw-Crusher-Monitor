name: crusher_monitor
description: Kannan Blue Metals — Jaw Crusher AI Monitor
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Network
  web_socket_channel: ^2.4.5
  http: ^1.2.1

  # Storage
  shared_preferences: ^2.3.2

  # Charts
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
